name: ⚗️ Run Quant Alchemist (Stats & Elo Compiler)

on:
  workflow_dispatch: # Erlaubt das manuelle Starten über den GitHub Button
  schedule:
    - cron: '0 4 * * 1' # Läuft automatisch jeden Montag um 04:00 Uhr UTC

jobs:
  build-stats-matrix:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install httpx supabase

    - name: Execute Quant Alchemist
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: python quant_alchemist.py
