name: Global Surface Rating Sync

on:
  schedule:
    # Läuft jeden Tag um 04:00 Uhr UTC (wenn die meisten Turniere des Vortages beendet sind)
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Erlaubt es dir, das Update jederzeit manuell im GitHub "Actions" Tab zu triggern

jobs:
  update-ratings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx supabase numpy

      - name: Run Global Rating Migration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} # Nutze Service Role für Schreibrechte
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python migrate_ratings.py

      - name: Log Completion
        run: echo "Surface Ratings successfully synchronized at $(date)"
