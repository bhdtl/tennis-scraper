name: Neural Scout Syncon v2.0

on:
  schedule:
    - cron: '*/30 * * * *'  # Alle 30 Minuten
  workflow_dispatch:        # Manueller Trigger erlaubt

permissions:
  contents: read

jobs:
  scrape:
    name: Run Scraper Job
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 🚀 SOTA FIX: Dependency Pinning (Verhindert den EllipticCurve Crash)
          pip install "cryptography==41.0.7" "pyjwt==2.8.0" pywebpush

      - name: Install Playwright & System Deps
        run: |
          playwright install chromium --with-deps

      - name: Run Scraper
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}             
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}             
          API_TENNIS_KEY: ${{ secrets.API_TENNIS_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} 
          
          # Hier wird das Secret aus GitHub Actions korrekt injiziert
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          python scraper.py
