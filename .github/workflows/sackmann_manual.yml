name: 🌊 Run Sackmann Quant Engine (Daily + Manual)

on:
  workflow_dispatch: # Erlaubt das manuelle Starten über einen Button
  schedule:
    # Läuft jeden Tag um 03:00 Uhr UTC (Mitten in der Nacht, optimal für Daily Resets)
    - cron: '0 3 * * *'

jobs:
  build-data-lake:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install httpx supabase

    - name: Run Sackmann Engine
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} 
      run: python sackmann_engine.py
