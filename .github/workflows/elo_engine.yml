name: 🧠 Run Elo Engine (Surface Elo Calculator)

on:
  workflow_dispatch: # Erlaubt das manuelle Starten über den GitHub Button
  schedule:
    - cron: '0 3 * * *' # Läuft automatisch jeden Tag um 03:00 Uhr UTC

jobs:
  calculate-elo:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install httpx supabase

    - name: Execute Elo Engine
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: python elo_engine.py
